<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cocktail Store</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

<div class="login-container">

    <div class="logo">
        <h1>🍸 Cocktail Store</h1>
        <p>Gestiona tu inventario de cócteles</p>
    </div>

    <form method="POST">

        <div class="form-group">
            <input
            type="email"
            name="correo"
            placeholder="Correo electrónico"
            required>
        </div>

        <div class="form-group">
            <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required>
        </div>

        <button class="btn-login">
            Iniciar Sesión
        </button>

    </form>

</div>

</body>
</html>
